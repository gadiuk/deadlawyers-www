name: PHP Composer

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download repository snapshot (no checkout)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/src"
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1 -C "$RUNNER_TEMP/src"

      - name: Validate and install Composer dependencies (if manifest exists)
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/src"

          if [ ! -f composer.json ]; then
            echo "No composer.json found. Skipping Composer checks."
            exit 0
          fi

          php -v
          composer --version
          composer validate --strict
          composer install --prefer-dist --no-progress --no-interaction
