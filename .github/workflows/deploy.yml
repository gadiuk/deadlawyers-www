name: Deploy WWW

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-www
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      DEPLOY_PATH: /home/dls0/deadlawyers.org/www
      PLUGIN_PATH_TYPO: wp-content/mu-plugins/dls-typography-pair.php
      PLUGIN_PATH_AUTHOR_ACTIVATOR: wp-content/mu-plugins/00-dls-native-authors-activate.php
      PLUGIN_PATH_ACTIVE_AUTHORS: wp-content/mu-plugins/dls-most-active-authors-shortcode.php
      PLUGIN_PATH_CATEGORY_SHOWCASE: wp-content/mu-plugins/dls-category-showcase-shortcode.php
      PLUGIN_PATH_CATEGORY_SINGLE: wp-content/mu-plugins/zz-dls-category-showcase-single-category.php
    steps:
      - name: Download MU plugins from repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${PLUGIN_PATH_TYPO}?ref=${GITHUB_SHA}" \
            -o /tmp/dls-typography-pair.php

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${PLUGIN_PATH_AUTHOR_ACTIVATOR}?ref=${GITHUB_SHA}" \
            -o /tmp/00-dls-native-authors-activate.php

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${PLUGIN_PATH_ACTIVE_AUTHORS}?ref=${GITHUB_SHA}" \
            -o /tmp/dls-most-active-authors-shortcode.php

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${PLUGIN_PATH_CATEGORY_SHOWCASE}?ref=${GITHUB_SHA}" \
            -o /tmp/dls-category-showcase-shortcode.php

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${PLUGIN_PATH_CATEGORY_SINGLE}?ref=${GITHUB_SHA}" \
            -o /tmp/zz-dls-category-showcase-single-category.php

          test -s /tmp/dls-typography-pair.php
          test -s /tmp/00-dls-native-authors-activate.php
          test -s /tmp/dls-most-active-authors-shortcode.php
          test -s /tmp/dls-category-showcase-shortcode.php
          test -s /tmp/zz-dls-category-showcase-single-category.php

      - name: Setup SSH key and known hosts
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          touch ~/.ssh/known_hosts
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload MU plugins (www)
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"

          ssh \
            -p "$PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}/wp-content/mu-plugins'"

          scp \
            -P "$PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            /tmp/dls-typography-pair.php \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/wp-content/mu-plugins/dls-typography-pair.php"

          scp \
            -P "$PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            /tmp/00-dls-native-authors-activate.php \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/wp-content/mu-plugins/00-dls-native-authors-activate.php"

          scp \
            -P "$PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            /tmp/dls-most-active-authors-shortcode.php \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/wp-content/mu-plugins/dls-most-active-authors-shortcode.php"

          scp \
            -P "$PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            /tmp/dls-category-showcase-shortcode.php \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/wp-content/mu-plugins/dls-category-showcase-shortcode.php"

          scp \
            -P "$PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            /tmp/zz-dls-category-showcase-single-category.php \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/wp-content/mu-plugins/zz-dls-category-showcase-single-category.php"

          ssh \
            -p "$PORT" \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "test -s '${DEPLOY_PATH}/wp-content/mu-plugins/dls-typography-pair.php' && test -s '${DEPLOY_PATH}/wp-content/mu-plugins/00-dls-native-authors-activate.php' && test -s '${DEPLOY_PATH}/wp-content/mu-plugins/dls-most-active-authors-shortcode.php' && test -s '${DEPLOY_PATH}/wp-content/mu-plugins/dls-category-showcase-shortcode.php' && test -s '${DEPLOY_PATH}/wp-content/mu-plugins/zz-dls-category-showcase-single-category.php'"
