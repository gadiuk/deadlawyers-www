name: Deploy WWW

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-www
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH key and known hosts
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${{ secrets.DEPLOY_USER }}
            Port ${PORT}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            IdentityAgent none
            PreferredAuthentications publickey
            PubkeyAuthentication yes
            PasswordAuthentication no
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          echo "Deploy target: ${DEPLOY_HOST}:${PORT}"

      - name: Deploy to production (www)
        shell: bash
        run: |
          set -euo pipefail
          ssh deploy-target '
            set -euo pipefail
            cd /home/dls0/deadlawyers.org
            git fetch origin
            git checkout main
            git pull --ff-only origin main
          '
